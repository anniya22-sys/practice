<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>교실바탕</title>
    <style>
        body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: #ffffff;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex; overflow: hidden;
        }

        .left-space { 
            width: 35%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
        }

        /* ⏱️ 60초 카운트다운 타이머 스타일 */
        .countdown-timer {
            font-size: 20rem;
            font-weight: 900;
            color: #ffb703;
            text-shadow: 0 0 40px rgba(255, 183, 3, 0.6);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .right-panel {
            width: 65%;
            height: 100%;
            padding: 40px 40px 60px 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
        }

        .header { text-align: center; margin-bottom: 20px; }
        
        /* ⏰ 시계 부분 (클릭 효과 제거됨) */
        .datetime { 
            font-size: 4.5rem; 
            font-weight: bold; 
            line-height: 1.1; 
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5); 
            color: #e2e8f0; 
        }

        .weather-info {
            display: flex; justify-content: center; align-items: center; margin-top: 15px;
        }
        .weather-box {
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            flex-wrap: wrap; gap: 37px; font-size: 1.2rem; color: #e2e8f0;
        }
        .weather-section { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .weather-highlight { color: #ffb703; font-weight: bold; font-size: 1.3rem; display: inline-flex; align-items: center; }
        .school-weather-label { font-weight: bold; color: #ffffff; font-size: 1.4rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); white-space: nowrap; }
        .current-temp { color: #00ffcc; font-size: 1.8rem; font-weight: 900; text-shadow: 0 0 10px rgba(0, 255, 204, 0.4); margin: 0 6px; }
        .w-icon { font-size: 1.4rem; }

        .status-board {
            background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 15px;
            text-align: center; font-size: 2.2rem; font-weight: bold; color: #00ffcc; margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-shadow: 1px 1px 3px rgba(0,0,0,0.5); word-break: keep-all; 
        }

        .content-area { display: flex; flex: 1; gap: 20px; overflow: hidden; }
        .col {
            display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.3); border-radius: 15px; padding: 20px; overflow-y: auto;
        }
        .col::-webkit-scrollbar { display: none; }
        
        .col-today-timetable { flex: 2.5; }
        .col-meal { flex: 2.5; } 
        .col-calendar { flex: 5; } 

        h2 {
            font-size: 1.3rem; color: #a8b2d1; border-bottom: 2px solid rgba(168, 178, 209, 0.3);
            padding-bottom: 10px; margin-top: 0; text-align: center; margin-bottom: 15px;
        }

        /* 달력 영역 */
        #calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;
            text-align: center; margin-bottom: 15px;
        }
        .cal-header { font-weight: bold; color: #a8b2d1; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cal-day {
            aspect-ratio: 1.3 / 1; display: flex; justify-content: center; align-items: center;
            border-radius: 8px; background: rgba(0,0,0,0.2); font-size: 1.1rem; position: relative;
        }
        .red-day { color: #f87171 !important; }
        .today-circle {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border: 2px solid #00ffcc; border-radius: 50%;
            color: #fff; font-weight: bold; background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }

        #calendar-events-list {
            flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
        }
        #calendar-events-list::-webkit-scrollbar { display: none; }
        .calendar-event-item {
            display: flex; gap: 10px; padding: 10px 12px; border-radius: 8px;
            align-items: flex-start;
            font-size: 0.95rem; color: #ffffff;
            line-height: 1.4;
        }

        .calendar-event-date { 
            font-weight: bold; 
            min-width: 45px; 
            text-align: right; 
            flex-shrink: 0;
        }
        /* 세로형 시간표 영역 */
        .vertical-timetable-item {
            background: rgba(0,0,0,0.2); margin-bottom: 10px; padding: 15px 12px;
            border-radius: 12px; display: flex; flex-direction: column; gap: 5px;
            transition: all 0.3s ease;
        }
        .vt-title { font-size: 1.5rem; font-weight: bold; color: #ffffff; display: flex; justify-content: center; align-items: center; }
        .vt-time { font-size: 1.2em; color: #a8b2d1; text-align: center; }
        .vt-moving { color: #ffb703; }

        /* 🔥 수정된 부분: 수업 시간(진한 파란색), 쉬는 시간(진한 붉은색) */
        .current-class { background-color: rgba(30, 58, 138, 0.9) !important; box-shadow: 0 0 10px rgba(30, 58, 138, 0.6); }
        .current-class .vt-title, .current-class .vt-time { color: #ffffff !important; }
        .next-class { background-color: rgba(153, 27, 27, 0.9) !important; box-shadow: 0 0 10px rgba(153, 27, 27, 0.6); }
        .next-class .vt-title, .next-class .vt-time { color: #ffffff !important; }

        /* 기타 */
        .monthly-item {
            display: flex; gap: 10px; margin-bottom: 12px; padding-bottom: 12px;
            border-bottom: 1px dashed rgba(255,255,255,0.1); font-size: clamp(0.75rem, 0.9vw, 0.95rem); line-height: 1.4;
        }
        .m-date { font-weight: bold; color: #00ffcc; min-width: 55px; flex-shrink: 0; text-align: right;}
        .m-content { color: #e2e8f0; white-space: pre-line; }
        .empty-plan { text-align: center; color: #a8b2d1; margin-top: 20px; font-size: 0.9rem;}
    </style>
</head>
<body>

    <div class="left-space" id="left-space"></div>
    <div class="right-panel">
        <div class="header">
            <div class="datetime" id="datetime">데이터 로딩 중...</div>
            <div class="weather-info" id="weather-info">
                <div class="weather-box">우리 학교 날씨 정보를 불러오는 중입니다... ☁️</div>
            </div>
        </div>

        <div class="status-board" id="status-board">데이터를 불러오는 중입니다...</div>

        <div class="content-area">
            
            <div class="col col-today-timetable">
                <h2 id="today-timetable-title">오늘의 시간표</h2>
                <div id="today-timetable-list">
                    <div class="empty-plan">시간표를 불러오는 중입니다...</div>
                </div>
            </div>

            <div class="col col-meal">
                <h2>급식 메뉴</h2>
                <div id="meal-list"><div class="empty-plan">급식 정보를 불러오는 중입니다...</div></div>
            </div>

            <div class="col col-calendar">
                <h2>학교 교육 활동</h2>
                <div id="calendar-grid"></div>
                <div id="calendar-events-list"></div>
            </div>

        </div>
    </div>

  <script>
        // ==========================================
        // ⚙️ API 설정
        // ==========================================
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbxdMUUTPAg6qonhrwPlPzY_urY35Nmz5RuiNGnbqd6s4x-GMyLqHJrEEFmUUrqY9D_Ugg/exec"
        };

        // ==========================================
        // ⏱️ 전역 변수 및 테스트용 시간 함수
        // ==========================================
        let globalData = null;
        let audioCtx = null;
        const playedAlarms = new Set(); 
        let lastBeepSecond = -1; // 카운트다운 뚜뚜 소리 중복 방지용

        let timeOffset = 0; 
        function getNow() {
            return new Date(Date.now() + timeOffset);
        }

        // ==========================================
        // 🖱️ 클릭 이벤트 (시간 오디오 & 시간 변경)
        // ==========================================
        document.body.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            else if (audioCtx.state === 'suspended') audioCtx.resume();
        });

        // 📅 달력의 '토'요일 클릭 시 시간 변경 작동하도록 이벤트 위임
        document.addEventListener('click', (e) => {
            if (e.target.id === 'time-change-btn') {
                e.stopPropagation(); // 배경 클릭 이벤트와 겹치지 않도록 방지
                const current = getNow();
                const pad = (n) => String(n).padStart(2, '0');
                const defaultTimeStr = `${current.getFullYear()}-${pad(current.getMonth()+1)}-${pad(current.getDate())} ${pad(current.getHours())}:${pad(current.getMinutes())}`;
                
                const input = prompt("테스트할 날짜와 시간을 입력하세요.\n(형식: YYYY-MM-DD HH:mm)", defaultTimeStr);
                
                if (input) {
                    // iOS/Safari 호환성을 위해 공백을 'T'로 변환
                    const targetDate = new Date(input.replace(' ', 'T')); 
                    if (!isNaN(targetDate.getTime())) {
                        timeOffset = targetDate.getTime() - Date.now();
                        playedAlarms.clear(); // 시간을 바꿨으므로 알람 기록 초기화
                        lastBeepSecond = -1;
                        
                        // 시간에 맞춰 달력과 시간표 다시 그리기
                        if (globalData && globalData.monthlyPlans) renderCalendarAndEvents(globalData.monthlyPlans);
                        if (globalData && globalData.timetable && globalData.timeSchedule) renderTodayTimetable(globalData.timetable, globalData.timeSchedule);
                        fetchMealData(); // 급식도 해당 날짜에 맞춰 다시 불러오기
                        updateDashboard(); // 대시보드 새로고침
                    } else {
                        alert("잘못된 날짜/시간 형식입니다. 다시 입력해 주세요.");
                    }
                }
            }
        });

        // ==========================================
        // 🔊 알람 소리 함수
        // ==========================================
        function playTone(frequency, startTime, duration, vol = 0.3) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = frequency;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(vol, startTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(startTime); osc.stop(startTime + duration);
        }

        function play1MinAlarm() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            playTone(659.25, now, 0.6); playTone(523.25, now + 0.5, 0.8);  
            playTone(659.25, now + 1.2, 0.6); playTone(523.25, now + 1.7, 0.8);  
        }

        function playStartAlarm() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const notes = [ {f: 523.25, t: 0, d: 0.4}, {f: 587.33, t: 0.5, d: 0.4}, {f: 659.25, t: 1.0, d: 0.2}, {f: 587.33, t: 1.25, d: 0.2}, {f: 523.25, t: 1.5, d: 0.4}, {f: 587.33, t: 2.0, d: 0.2}, {f: 659.25, t: 2.25, d: 0.5} ];
            notes.forEach(n => playTone(n.f, now + n.t, n.d + 0.5));
        }

        function playEndAlarm() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const notes = [ {f: 783.99, t: 0, d: 0.2}, {f: 659.25, t: 0.25, d: 0.2}, {f: 523.25, t: 0.5, d: 0.4}, {f: 587.33, t: 1.0, d: 0.2}, {f: 659.25, t: 1.25, d: 0.2}, {f: 523.25, t: 1.5, d: 0.6} ];
            notes.forEach(n => playTone(n.f, now + n.t, n.d + 0.5));
        }

        // ==========================================
        // ⛅ 날씨 및 급식
        // ==========================================
        async function updateWeather() {
            if (!CONFIG.LATITUDE || !CONFIG.LONGITUDE) return; 
            try {
                const lat = CONFIG.LATITUDE; const lon = CONFIG.LONGITUDE;
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weathercode,temperature_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FSeoul`);
                const weatherData = await weatherRes.json();
                const aqiRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm10,pm2_5&timezone=Asia%2FSeoul`);
                const aqiData = await aqiRes.json();

                const currentCode = weatherData.current.weathercode;
                const currentTempNum = Math.round(weatherData.current.temperature_2m);
                const maxTempNum = Math.round(weatherData.daily.temperature_2m_max[0]);
                const minTempNum = Math.round(weatherData.daily.temperature_2m_min[0]);
                const rainProb = weatherData.daily.precipitation_probability_max[0] + "%";
                const pm10 = Math.round(aqiData.current.pm10);
                const pm25 = Math.round(aqiData.current.pm2_5);

                let pm10Status = ""; let pm10Color = "";
                if (pm10 <= 30) { pm10Status = "좋음"; pm10Color = "#38bdf8"; }     
                else if (pm10 <= 80) { pm10Status = "보통"; pm10Color = "#4ade80"; } 
                else if (pm10 <= 150) { pm10Status = "나쁨"; pm10Color = "#fbbf24"; } 
                else { pm10Status = "매우 나쁨"; pm10Color = "#f87171"; }            

                let pm25Status = ""; let pm25Color = "";
                if (pm25 <= 15) { pm25Status = "좋음"; pm25Color = "#38bdf8"; }
                else if (pm25 <= 35) { pm25Status = "보통"; pm25Color = "#4ade80"; }
                else if (pm25 <= 75) { pm25Status = "나쁨"; pm25Color = "#fbbf24"; }
                else { pm25Status = "매우 나쁨"; pm25Color = "#f87171"; }

                let weatherIcon = "☀️";
                if (currentCode >= 1 && currentCode <= 3) weatherIcon = "⛅";
                else if (currentCode >= 45 && currentCode <= 48) weatherIcon = "🌫️";
                else if (currentCode >= 51 && currentCode <= 67) weatherIcon = "☔";
                else if (currentCode >= 71 && currentCode <= 77) weatherIcon = "⛄";
                else if (currentCode >= 80 && currentCode <= 82) weatherIcon = "🌧️";
                else if (currentCode >= 95) weatherIcon = "⛈️";

                let tempHtml = "";
                const currentSpan = `<span class="current-temp">${currentTempNum}℃</span>`;
                if (currentTempNum <= minTempNum) tempHtml = `${currentSpan} ~ ${maxTempNum}℃`;
                else if (currentTempNum >= maxTempNum) tempHtml = `${minTempNum}℃ ~ ${currentSpan}`;
                else tempHtml = `${minTempNum}℃ ~ ${currentSpan} ~ ${maxTempNum}℃`;

                document.getElementById('weather-info').innerHTML = `
                    <div class="weather-box">
                        <div class="school-weather-label">학교 날씨</div>
                        <div class="weather-section"><span class="w-icon">${weatherIcon}</span></div>
                        <div class="weather-section"><span class="w-icon">☔</span><span class="weather-highlight">${rainProb}</span></div>
                        <div class="weather-section"><span class="w-icon">🌡️</span><span class="weather-highlight">${tempHtml}</span></div>
                        <div class="weather-section">
                            <span class="w-icon">😷</span>
                            <span style="display: inline-flex; align-items: center; gap: 4px;">
                                미세 <span class="weather-highlight" style="color: ${pm10Color};">${pm10Status}(${pm10})</span>
                                <span style="color: rgba(255,255,255,0.3); margin: 0 2px;">|</span>
                                초미세 <span class="weather-highlight" style="color: ${pm25Color};">${pm25Status}(${pm25})</span>
                            </span>
                        </div>
                    </div>`;
            } catch (error) { document.getElementById('weather-info').innerHTML = `<div class="weather-box" style="color: #ff4444;">날씨 정보를 불러오지 못했습니다. 🥲</div>`; }
        }

        async function fetchMealData() {
            if (!CONFIG.NEIS_API_KEY || !CONFIG.SCHOOL_NAME) return;
            const apiKey = CONFIG.NEIS_API_KEY; const schoolName = CONFIG.SCHOOL_NAME;
            const container = document.getElementById('meal-list');

            const formatDate = (date) => `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`;
            const formatDisplayDate = (dateStr) => {
                const y = parseInt(dateStr.substring(0, 4)); const m = parseInt(dateStr.substring(4, 6)) - 1; const d = parseInt(dateStr.substring(6, 8));
                const mealDate = new Date(y, m, d);
                return `${m + 1}/${d}(${['일', '월', '화', '수', '목', '금', '토'][mealDate.getDay()]})`;
            };

            try {
                const schoolRes = await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${apiKey}&Type=json&SCHUL_NM=${encodeURIComponent(schoolName)}`);
                const schoolData = await schoolRes.json();
                const school = schoolData.schoolInfo[1].row[0];
                
                // 설정된 시간에 맞춰 급식을 가져오도록 변경
                const today = getNow(); 
                const nextTwoWeeks = new Date(today); nextTwoWeeks.setDate(today.getDate() + 14);
                const mealUrl = `https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${apiKey}&Type=json&ATPT_OFCDC_SC_CODE=${school.ATPT_OFCDC_SC_CODE}&SD_SCHUL_CODE=${school.SD_SCHUL_CODE}&MLSV_FROM_YMD=${formatDate(today)}&MLSV_TO_YMD=${formatDate(nextTwoWeeks)}`;
                const mealRes = await fetch(mealUrl);
                const mealData = await mealRes.json();

                if (!mealData.mealServiceDietInfo || !mealData.mealServiceDietInfo[1].row) {
                    container.innerHTML = `<div class="empty-plan">예정된 급식이 없습니다.</div>`; return;
                }
                
                let html = '';
                mealData.mealServiceDietInfo[1].row.slice(0, 3).forEach((meal) => {
                    let cleanMenu = meal.DDISH_NM.replace(/\([^)]*\d[^)]*\)/g, '').replace(/<br\/>/g, '\n').trim();
                    html += `<div class="monthly-item"><div class="m-date">${formatDisplayDate(meal.MLSV_YMD)}</div><div class="m-content">${cleanMenu}</div></div>`;
                });
                container.innerHTML = html;
            } catch (error) { container.innerHTML = `<div class="empty-plan" style="color: #ff4444;">급식 정보를 불러오지 못했습니다.</div>`; }
        }

        // ==========================================
        // 📅 달력 및 학사일정 렌더링 (3주)
        // ==========================================
        function renderCalendarAndEvents(monthlyPlans) {
            const calGrid = document.getElementById('calendar-grid');
            const eventList = document.getElementById('calendar-events-list');
            const now = getNow();
            const todayStr = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;

            // 오늘의 자정 시간 (과거 일정 비교용)
            const todayDateOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            // 이번 주 일요일 구하기
            const startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            startDate.setDate(startDate.getDate() - startDate.getDay());

            // 무지개 배경색 지정 (다크모드에 맞게 채도/명도 조절)
            const rainbowColors = [
                'rgba(255, 89, 94, 0.6)',  // 빨강
                'rgba(255, 202, 58, 0.6)', // 주황/노랑
                'rgba(138, 201, 38, 0.6)', // 초록
                'rgba(25, 130, 196, 0.6)', // 파랑
                'rgba(106, 76, 147, 0.6)', // 보라
                'rgba(255, 146, 169, 0.6)' // 핑크
            ];

            let html = `
                <div class="cal-header red-day">일</div><div class="cal-header">월</div>
                <div class="cal-header">화</div><div class="cal-header">수</div>
                <div class="cal-header">목</div><div class="cal-header">금</div>
                <div class="cal-header red-day" id="time-change-btn" title="클릭하여 시간을 변경해보세요" style="cursor: pointer; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">토</div>
            `;

            let upcomingEventsHTML = '';
            let colorIndex = 0;

            for (let i = 0; i < 21; i++) { // 🔥 3주 = 21일로 변경
                const currentDate = new Date(startDate);
                currentDate.setDate(startDate.getDate() + i);

                const cMonth = currentDate.getMonth() + 1;
                const cDate = currentDate.getDate();
                const cDay = currentDate.getDay();
                const dateKey = `${currentDate.getFullYear()}-${cMonth}-${cDate}`;
                
                const isToday = (dateKey === todayStr);
                const isWeekend = (cDay === 0 || cDay === 6);
                
                // 어제까지의 날짜인지 확인
                const isPast = currentDate.getTime() < todayDateOnly.getTime();

                // 현재 날짜에 해당하는 일정 찾기
                const dayEvents = monthlyPlans.filter(p => parseInt(p.month) === cMonth && parseInt(p.date) === cDate);

                let isHoliday = false;
                let cellStyle = '';
                
                if (dayEvents.length > 0) {
                    dayEvents.forEach(ev => {
                        let content = ev.content ? String(ev.content).trim() : (ev.note ? String(ev.note).trim() : "");
                        if (content.includes("휴일")) {
                            isHoliday = true;
                        }
                    });

                    // 과거 일정이 아닐 때만 색상 부여 및 하단 목록에 추가
                    if (!isPast) {
                        const color = rainbowColors[colorIndex % rainbowColors.length];
                        cellStyle = `background: ${color};`; // 달력 칸 배경색

                        dayEvents.forEach(ev => {
                            let displayContent = ev.content ? String(ev.content).trim() : (ev.note ? String(ev.note).trim() : "");
                            if (displayContent) {
                                // 요청사항: ') '가 포함된 경우 줄바꿈으로 변경
                                displayContent = displayContent.split(') ').join(')<br>');
                                
                                // 달력 하단에 들어갈 일정 (같은 배경색 매칭)
                                upcomingEventsHTML += `
                                <div class="calendar-event-item" style="background: ${color.replace('0.6', '0.2')}; border-left: 5px solid ${color.replace('0.6', '1')};">
                                    <div class="calendar-event-date">${cMonth}/${cDate}(${["일","월","화","수","목","금","토"][cDay]})</div>
                                    <div>${displayContent}</div>
                                </div>`;
                            }
                        });
                        colorIndex++;
                    }
                }

                // 주말이거나 일정 텍스트에 "휴일"이 포함되어 있으면 빨간색 적용
                let textClass = (isWeekend || isHoliday) ? 'red-day' : '';
                const displayNum = isToday ? `<div class="today-circle">${cDate}</div>` : cDate;
                
                html += `<div class="cal-day ${textClass}" style="${cellStyle}">${displayNum}</div>`;
            }

            calGrid.innerHTML = html;
            eventList.innerHTML = upcomingEventsHTML || '<div class="empty-plan" style="margin-top:20px;">예정된 일정이 없습니다.</div>';
        }

        // ==========================================
        // 🏫 오늘의 시간표 렌더링 (세로형)
        // ==========================================
        function renderTodayTimetable(timetable, timeSchedule) {
            const container = document.getElementById('today-timetable-list');
            const title = document.getElementById('today-timetable-title');
            const now = getNow();
            const daysArr = ["일", "월", "화", "수", "목", "금", "토"];
            const dayOfWeek = now.getDay();
            const todayStr = daysArr[dayOfWeek];

            title.innerText = `${todayStr}요일 시간표`;

            if (dayOfWeek === 0 || dayOfWeek === 6) {
                container.innerHTML = '<div class="empty-plan" style="margin-top:20px;">주말입니다.<br>편안한 하루 보내세요!</div>';
                return;
            }

            const todaySubjects = timetable[todayStr] || [];
            if (todaySubjects.length === 0) {
                container.innerHTML = '<div class="empty-plan" style="margin-top:20px;">오늘의 시간표 정보가 없습니다.</div>';
                return;
            }

            let html = '';
            for (let i = 0; i < todaySubjects.length; i++) {
                let subject = todaySubjects[i];
                if (!subject || String(subject).trim() === "") continue;

                let isMoving = false;
                let displayText = String(subject);
                if (displayText.includes('0')) {
                    isMoving = true;
                    displayText = displayText.replace('0', '');
                }

                // 시작/종료 시간 매칭
                let startStr = ""; let endStr = "";
                const periodLabel = `${i + 1}교시`;
                const tInfoIndex = timeSchedule.findIndex(t => t.label.includes(periodLabel));

                if (tInfoIndex !== -1) {
                    startStr = timeSchedule[tInfoIndex].startTime || "00:00";
                    if (tInfoIndex < timeSchedule.length - 1 && timeSchedule[tInfoIndex + 1].startTime) {
                        endStr = timeSchedule[tInfoIndex + 1].startTime;
                    } else {
                        // 마지막 교시일 경우 대략 40분 더하기
                        const [h, m] = startStr.split(':').map(Number);
                        const eDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m + 40);
                        endStr = `${String(eDate.getHours()).padStart(2, '0')}:${String(eDate.getMinutes()).padStart(2, '0')}`;
                    }
                }

                const moveClass = isMoving ? 'vt-moving' : '';
                const displaySubject = isMoving ? `${displayText}` : displayText;

                html += `
                <div class="vertical-timetable-item" id="v-period-${i}">
                    <div class="vt-title ${moveClass}">
                        ${i + 1}교시 ${displaySubject}
                    </div>
                    <div class="vt-time">${startStr}~${endStr}</div>
                </div>
                `;
            }
            container.innerHTML = html;
        }

        // ==========================================
        // 📊 데이터 연동 및 초기화
        // ==========================================
        function loadData() {
            fetch(CONFIG.API_URL)
                .then(response => response.json())
                .then(data => {
                    globalData = data;
                    const info = data.schoolInfo || {};
                    CONFIG.SCHOOL_NAME = info["학교명"] || "학교명 미설정";
                    CONFIG.LATITUDE = parseFloat(info["학교 위도"] || 35.3045);
                    CONFIG.LONGITUDE = parseFloat(info["학교 경도"] || 128.7295);
                    CONFIG.NEIS_API_KEY = info["나이스 API"] || "";

                    try { if (data.monthlyPlans) renderCalendarAndEvents(data.monthlyPlans); } 
                    catch(e) { console.error("달력 렌더링 에러:", e); }

                    try { if (data.timetable && data.timeSchedule) renderTodayTimetable(data.timetable, data.timeSchedule); } 
                    catch(e) { console.error("세로 시간표 렌더링 에러:", e); }

                    updateWeather(); fetchMealData();
                    if(window.dashboardInterval) clearInterval(window.dashboardInterval);
                    window.dashboardInterval = setInterval(updateDashboard, 1000);
                    updateDashboard(); 
                })
                .catch(error => {
                    document.getElementById('status-board').innerText = "데이터 로딩 실패! 잠시 후 다시 시도합니다... 🔄";
                    setTimeout(loadData, 5000);
                });
        }

        loadData();
        setInterval(updateWeather, 1800000);
        setInterval(fetchMealData, 1800000); 

        // ==========================================
        // ⏰ 대시보드 상태판 & 교시 하이라이트 동기화
        // ==========================================
        function getPeriodIndex(name) {
            const match = String(name || "").match(/(\d)교시/);
            return match ? parseInt(match[1]) - 1 : -1;
        }

        function updateDashboard() {
            if (!globalData) return;
            const now = getNow();
            const daysArr = ["일", "월", "화", "수", "목", "금", "토"];
            const dayOfWeek = now.getDay();
            const todayStr = daysArr[dayOfWeek];

            document.getElementById('datetime').innerText = `${now.getMonth() + 1}월 ${now.getDate()}일 (${todayStr}) ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

            if (dayOfWeek === 0 || dayOfWeek === 6) {
                document.getElementById('status-board').innerText = "오늘은 즐거운 주말입니다! 충전의 시간을 가지세요 🔋";
                return;
            }

            const timeData = globalData.timeSchedule || [];
            const times = timeData.map((t, i, arr) => {
                const label = String(t.label || "");
                const [h, m] = String(t.startTime || "00:00").split(':').map(Number);
                const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h || 0, m || 0, 0);
                let end;
                if (i < arr.length - 1 && arr[i+1].startTime) {
                    const [eh, em] = String(arr[i+1].startTime).split(':').map(Number);
                    end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), eh || 0, em || 0, 0);
                } else end = new Date(start.getTime() + 10 * 60000);
                return { ...t, label, start, end };
            });

            // 세로 시간표 하이라이트 초기화
            document.querySelectorAll('.vertical-timetable-item').forEach(el => el.classList.remove('current-class', 'next-class'));

            let currentEvent = times.find(t => now >= t.start && now < t.end);
            let nextEvent = times.find(t => now < t.start);
            const statusEl = document.getElementById('status-board');
            const leftSpaceEl = document.getElementById('left-space');

            if (!currentEvent && !nextEvent) {
                statusEl.innerText = "오늘의 일정이 모두 끝났습니다! 수고하셨습니다 👏"; 
                leftSpaceEl.innerHTML = '';
                return;
            }

            // 🔥 첫 일정 시작 전 (00:00 ~ 첫 일정 시작 전) 메시지 고정
            if (!currentEvent && nextEvent === times[0]) {
                statusEl.style.color = "#00ffcc";
                statusEl.innerText = "오늘 시간표를 확인하고 준비하세요";
                leftSpaceEl.innerHTML = '';
                lastBeepSecond = -1;
                return; 
            }

            // 하이라이트 계산 및 DOM 요소에 클래스 추가
            let highlightPeriod = -1; let highlightClass = '';
            if (currentEvent && currentEvent.label.includes('교시')) {
                highlightPeriod = getPeriodIndex(currentEvent.label); highlightClass = 'current-class';
            } else if (nextEvent && nextEvent.label.includes('교시')) {
                highlightPeriod = getPeriodIndex(nextEvent.label); highlightClass = 'next-class';
            }

            if (highlightPeriod !== -1) {
                const targetEl = document.getElementById(`v-period-${highlightPeriod}`);
                if (targetEl) targetEl.classList.add(highlightClass);
            }

            let targetEvent = (currentEvent && currentEvent.label.includes('교시')) ? currentEvent : (nextEvent || currentEvent);
            let isDuringClass = !!(currentEvent && currentEvent.label.includes('교시'));
            let diffMs = (isDuringClass ? targetEvent.end : targetEvent.start) - now;
            
            // 👉 남은 시간 올림 처리 적용
            const diffMins = Math.floor(diffMs / 60000); // 60초 미만 판별용 (내림)
            const displayMins = Math.ceil(diffMs / 60000); // 화면 표시용 (올림)
            const diffSecs = Math.floor((diffMs % 60000) / 1000);
            const totalSecsLeft = Math.ceil(diffMs / 1000);

            let subjectStr = "";
            const periodIdx = getPeriodIndex(targetEvent.label);
            if (periodIdx !== -1 && globalData.timetable && globalData.timetable[todayStr]) {
                const subject = globalData.timetable[todayStr][periodIdx];
                if (subject) subjectStr = ` ${String(subject).replace('0', '')}`;
            }

            statusEl.style.color = "#00ffcc"; 
            
            if (isDuringClass) {
                const elapsedMs = now - targetEvent.start;
                if (elapsedMs >= 0 && elapsedMs <= 2000 && !playedAlarms.has(`start-${targetEvent.label}`)) { playStartAlarm(); playedAlarms.add(`start-${targetEvent.label}`); }
                if (diffMs <= 2000 && !playedAlarms.has(`end-${targetEvent.label}`)) { playEndAlarm(); playedAlarms.add(`end-${targetEvent.label}`); }
                statusEl.innerText = subjectStr.trim() ? `${subjectStr.trim()} 수업 중입니다.` : `수업 중입니다.`;
                
                // 수업 중에는 카운트다운 초기화
                leftSpaceEl.innerHTML = '';
                lastBeepSecond = -1;
            } else {
                if (targetEvent.label.includes("교시")) {
                    if (diffMs <= 61000 && diffMs > 0 && !playedAlarms.has(`1min-${targetEvent.label}`)) { play1MinAlarm(); playedAlarms.add(`1min-${targetEvent.label}`); }
                    
                    // ⏱️ 60초 카운트다운 로직
                    if (totalSecsLeft <= 60 && totalSecsLeft > 0) {
                        leftSpaceEl.innerHTML = `<div class="countdown-timer">${totalSecsLeft}</div>`;
                        statusEl.style.color = "#ffb703";
                        statusEl.innerText = `수업이 ${totalSecsLeft}초 남았습니다. 자리 앉기, 교과서 준비!`;
                    } else {
                        leftSpaceEl.innerHTML = '';
                        lastBeepSecond = -1;
                        statusEl.style.color = "#00ffcc";
                        statusEl.innerText = `${targetEvent.label}${subjectStr ? subjectStr : ""} ${displayMins}분 남았습니다. 책 준비, 화장실 다녀오기`;
                    }
                } else {
                    leftSpaceEl.innerHTML = '';
                    lastBeepSecond = -1;
                    statusEl.innerText = diffMins === 0 ? `${targetEvent.label} 시작 ${diffSecs}초 전!` : `${targetEvent.label} ${displayMins}분 전`;
                }
            }
        }
    </script>
