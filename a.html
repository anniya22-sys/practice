
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Mood Pulse</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Development version for better error messages) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel CDN for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Recharts Dependencies (Required for Recharts to run in UMD mode) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #FDFCF8; }
        .chart-container .recharts-wrapper { margin: 0 auto; }
        /* Lucide icon alignment fix */
        .lucide { vertical-align: middle; display: inline-block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Recharts is now available globally
        const { useState, useEffect, useMemo } = React;
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
            PieChart, Pie, Cell 
        } = window.Recharts; // Access via window to be safe

        // --- Configuration ---
        const MOOD_DATA_KEY = 'class_mood_pulse_data';
        const EMOTIONS = [
            { label: '최고예요', emoji: '🤩', score: 100, color: '#FCD34D', type: 'positive' },
            { label: '좋아요', emoji: '😊', score: 80, color: '#6EE7B7', type: 'positive' },
            { label: '그저 그래요', emoji: '😐', score: 50, color: '#93C5FD', type: 'neutral' },
            { label: '힘들어요', emoji: '😢', score: 30, color: '#FCA5A5', type: 'caution' },
            { label: '화나요/슬퍼요', emoji: '😫', score: 10, color: '#F87171', type: 'danger' },
        ];

        // --- Logic Functions ---
        const analyzeSentiment = (text) => {
            const negativeWords = ['힘들어', '슬퍼', '괴로워', '짜증', '싫어', '싸웠어', '아파'];
            const dangerWords = ['죽고싶어', '도망', '폭발', '심각'];
            if (dangerWords.some(w => text.includes(w))) return 'danger';
            if (negativeWords.some(w => text.includes(w))) return 'caution';
            return 'neutral';
        };

        const extractKeywords = (entries) => {
            if (!entries || entries.length === 0) return [];
            const stopWords = ['진짜', '너무', '오늘', '그냥', '하고', '해서', '있어', '하고싶어', '많이'];
            const wordFreq = {};
            entries.forEach(entry => {
                if (!entry.text) return;
                const words = entry.text.split(/[\s,.;!]+/).filter(w => w.length > 1 && !stopWords.includes(w));
                words.forEach(word => { wordFreq[word] = (wordFreq[word] || 0) + 1; });
            });
            return Object.entries(wordFreq).sort((a, b) => b[1] - a[1]).slice(0, 10).map(([text, count]) => ({ text, count }));
        };

        // --- Sub Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const StudentView = ({ onNewEntry }) => {
            const [selectedEmoji, setSelectedEmoji] = useState(null);
            const [studentName, setStudentName] = useState('');
            const [note, setNote] = useState('');
            const [submitted, setSubmitted] = useState(false);

            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [submitted]);

            const handleSubmit = () => {
                if (!selectedEmoji || !studentName.trim()) return;
                const entry = {
                    id: Date.now(),
                    studentName: studentName.trim(),
                    emoji: selectedEmoji.emoji,
                    score: selectedEmoji.score,
                    text: note,
                    sentiment: selectedEmoji.type === 'positive' ? 'positive' : analyzeSentiment(note),
                    timestamp: new Date().toISOString(),
                };
                onNewEntry(entry);
                setSubmitted(true);
                setNote('');
                setStudentName('');
                setSelectedEmoji(null);
            };

            if (submitted) {
                return (
                    <div className="flex flex-col items-center justify-center p-12 bg-white rounded-3xl shadow-xl border-4 border-yellow-200 text-center animate-bounce">
                        <span className="text-8xl mb-6">🌟</span>
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">마음 기록 완료!</h2>
                        <p className="text-gray-500 text-lg">선생님께 너의 마음이 잘 전달되었어.</p>
                        <button onClick={() => setSubmitted(false)} className="mt-8 px-6 py-2 text-blue-500 font-medium hover:underline">다시 입력하기</button>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto space-y-8">
                    <header className="text-center space-y-4">
                        <h1 className="text-4xl font-bold text-gray-800">오늘 너의 마음은 어때?</h1>
                        <p className="text-xl text-gray-500">솔직한 기분을 선생님께 들려줘!</p>
                    </header>
                    <div className="grid grid-cols-5 gap-4">
                        {EMOTIONS.map((e) => (
                            <button key={e.label} onClick={() => setSelectedEmoji(e)} className={`flex flex-col items-center p-4 rounded-2xl transition-all border-4 ${selectedEmoji?.label === e.label ? 'border-blue-400 bg-blue-50 scale-105 shadow-md shadow-blue-100' : 'border-transparent bg-white hover:bg-gray-50'}`}>
                                <span className="text-4xl mb-2">{e.emoji}</span>
                                <span className="text-sm font-medium text-gray-600">{e.label}</span>
                            </button>
                        ))}
                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-sm space-y-4 border border-gray-100">
                        <label className="block text-gray-700 font-semibold text-lg">오늘 있었던 일을 짧게 적어줘 (선택사항)</label>
                        <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="여기에 적어줘..." className="w-full h-32 p-4 rounded-xl bg-gray-50 border-none focus:ring-2 focus:ring-blue-300 resize-none text-lg" />
                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-sm space-y-4 border border-gray-100">
                        <label className="block text-gray-700 font-semibold text-lg flex items-center gap-2">누가 쓰고 있나요?</label>
                        <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="이름을 적어주세요" className="w-full p-4 rounded-xl bg-gray-50 border-none focus:ring-2 focus:ring-blue-300 text-lg" />
                    </div>
                    <button onClick={handleSubmit} disabled={!selectedEmoji || !studentName.trim()} className={`w-full py-5 rounded-2xl text-xl font-bold shadow-lg transition-all ${selectedEmoji && studentName.trim() ? 'bg-blue-500 text-white hover:bg-blue-600' : 'bg-gray-200 text-gray-400 cursor-not-allowed opacity-50'}`}>전송하기</button>
                </div>
            );
        };

        const TeacherDashboard = ({ data }) => {
            const stats = useMemo(() => {
                if (!data || data.length === 0) return { avg: 0, alerts: [], counts: { positive: 0, neutral: 0, caution: 0, danger: 0 }, keywords: [] };
                const avg = data.reduce((acc, curr) => acc + curr.score, 0) / data.length;
                const alerts = data.filter(d => d.sentiment === 'danger' || d.sentiment === 'caution');
                const counts = data.reduce((acc, curr) => {
                    acc[curr.sentiment] = (acc[curr.sentiment] || 0) + 1;
                    return acc;
                }, { positive: 0, neutral: 0, caution: 0, danger: 0 });
                return { avg, alerts, counts, keywords: extractKeywords(data) };
            }, [data]);

            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [data]);

            const pieData = [
                { name: '긍정', value: stats.counts.positive, color: '#10B981' },
                { name: '중립', value: stats.counts.neutral, color: '#3B82F6' },
                { name: '주의', value: stats.counts.caution, color: '#F59E0B' },
                { name: '위험', value: stats.counts.danger, color: '#EF4444' },
            ].filter(d => d.value > 0);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-6">
                            <div className="relative h-40 w-12 bg-gray-100 rounded-full overflow-hidden border-2 border-gray-200 shadow-inner">
                                <div className="absolute bottom-0 w-full transition-all duration-1000 bg-gradient-to-t from-red-500 via-orange-400 to-yellow-300" style={{ height: `${stats.avg}%` }} />
                            </div>
                            <div>
                                <h3 className="text-gray-500 font-medium mb-1">학급 감정 온도</h3>
                                <div className="text-4xl font-black text-gray-800">{Math.round(stats.avg)}°C</div>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 h-52">
                            <h3 className="text-gray-500 font-medium mb-2">감정 분포</h3>
                            <ResponsiveContainer width="100%" height="80%">
                                <PieChart>
                                    <Pie data={pieData.length > 0 ? pieData : [{value: 1}]} innerRadius={30} outerRadius={50} dataKey="value" isAnimationActive={false}>
                                        {(pieData.length > 0 ? pieData : [{color: '#eee'}]).map((entry, i) => <Cell key={i} fill={entry.color} />)}
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                            <h3 className="text-gray-500 font-medium mb-4">오늘의 키워드</h3>
                            <div className="flex flex-wrap gap-2">
                                {stats.keywords.length > 0 ? stats.keywords.map((kw, i) => (
                                    <span key={i} className="px-3 py-1 bg-blue-50 text-blue-600 rounded-full font-bold transition-all hover:scale-110" style={{ fontSize: `${Math.min(12 + kw.count * 2, 22)}px` }}>#{kw.text}</span>
                                )) : <div className="text-sm text-gray-400 italic">데이터 없음</div>}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="p-6 border-b font-bold flex justify-between">
                                <span>위험/주의 학생</span>
                                <span className="text-red-500">{stats.alerts.length}명</span>
                            </div>
                            <div className="max-h-60 overflow-y-auto">
                                {stats.alerts.length > 0 ? stats.alerts.map(item => (
                                    <div key={item.id} className="p-4 border-b bg-red-50/20">
                                        <div className="font-bold">{item.emoji} {item.studentName}</div>
                                        <p className="text-sm text-gray-600 italic">"{item.text || '내용 없음'}"</p>
                                    </div>
                                )) : <div className="p-10 text-center text-gray-400">주의 학생이 없습니다.</div>}
                            </div>
                        </div>
                        <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="p-6 border-b font-bold">실시간 학급 피드</div>
                            <div className="max-h-60 overflow-y-auto">
                                {data.length > 0 ? data.slice().reverse().map(item => (
                                    <div key={item.id} className="p-4 border-b flex gap-3">
                                        <div className="text-2xl">{item.emoji}</div>
                                        <div>
                                            <div className="font-bold text-sm">{item.studentName}</div>
                                            <p className="text-sm text-gray-600">{item.text || '기분만 남김'}</p>
                                        </div>
                                    </div>
                                )) : <div className="p-10 text-center text-gray-400">피드가 비어 있습니다.</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('student');
            const [entries, setEntries] = useState([]);
            const [showConfirm, setShowConfirm] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem(MOOD_DATA_KEY);
                if (saved) setEntries(JSON.parse(saved));
                if (window.lucide) window.lucide.createIcons();
            }, []);

            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [view, showConfirm]);

            const handleNewEntry = (entry) => {
                const updated = [...entries, entry];
                setEntries(updated);
                localStorage.setItem(MOOD_DATA_KEY, JSON.stringify(updated));
            };

            const clearData = () => {
                setEntries([]);
                localStorage.setItem(MOOD_DATA_KEY, JSON.stringify([]));
                setShowConfirm(false);
            };

            return (
                <div className="min-h-screen">
                    {showConfirm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
                                <h3 className="text-xl font-bold mb-4">데이터를 초기화할까요?</h3>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowConfirm(false)} className="flex-1 py-3 bg-gray-100 rounded-xl">취소</button>
                                    <button onClick={clearData} className="flex-1 py-3 bg-red-500 text-white rounded-xl">초기화</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <nav className="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-black text-xl">
                            <Icon name="heart" className="text-blue-500" />
                            <span>Class Mood Pulse</span>
                        </div>
                        <div className="flex bg-gray-100 p-1 rounded-xl">
                            <button onClick={() => setView('student')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${view === 'student' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-400'}`}>학생용</button>
                            <button onClick={() => setView('teacher')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${view === 'teacher' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-400'}`}>교사용</button>
                        </div>
                    </nav>
                    <main className="max-w-6xl mx-auto px-6 py-10">
                        {view === 'student' ? <StudentView onNewEntry={handleNewEntry} /> : (
                            <div className="space-y-8">
                                <header className="flex justify-between items-end bg-white p-6 rounded-3xl border">
                                    <div><h1 className="text-3xl font-bold">우리 반 리포트</h1><p className="text-gray-500">수집된 데이터: {entries.length}개</p></div>
                                    <button onClick={() => setShowConfirm(true)} className="px-4 py-2 bg-red-50 text-red-500 rounded-xl font-bold hover:bg-red-100 transition-colors">데이터 삭제</button>
                                </header>
                                <TeacherDashboard data={entries} />
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
